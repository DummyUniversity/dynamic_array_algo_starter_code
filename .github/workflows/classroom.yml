      id: da-algo-000
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: DA Algo 000
        setup-command: g++ main.cpp test.cpp da_algo.cpp -o a.out
        command: "./a.out 000"
        input: ''
        expected-output: '0 1 2 3 4'
        comparison-method: exact
        timeout: 1
        max-score: 1
